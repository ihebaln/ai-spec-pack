name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
    - name: Run unit tests
      run: python -m pytest tests/test_placeholder.py -v

  data-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install pytest pandas
    - name: Run data quality checks
      run: python -m pytest tests/test_data_checks.py -v

  eval-gate:
    runs-on: ubuntu-latest
    needs: [test, data-check]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        pip install pytest pandas pyyaml scikit-learn
    - name: Run evaluation gate
      run: python -m pytest tests/test_eval.py -v